{% extends "base.html" %}

{% block content %}
<div class="news-header py-5 bg-light">
    <div class="container">
        <h1 class="text-center">お知らせ</h1>
    </div>
</div>

<section class="news-section py-5">
    <div class="container">
        <div class="row">
            {% for post in posts %}
            <div class="col-md-8 offset-md-2 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title">{{ post.title }}</h2>
                        <p class="text-muted">{{ post.date.strftime('%Y年%m月%d日') }}</p>
                        <div class="card-text">
                            {{ post.content }}
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <div class="share-buttons mt-3">
                                <a href="https://twitter.com/intent/tweet?text={{ post.title|urlencode }}&url={{ request.url|urlencode }}" 
                                   class="btn btn-outline-primary btn-sm me-2" target="_blank">
                                    <i class="fab fa-x-twitter"></i> シェア
                                </a>
                                <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.url|urlencode }}" 
                                   class="btn btn-outline-primary btn-sm" target="_blank">
                                    <i class="fab fa-facebook"></i> シェア
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
