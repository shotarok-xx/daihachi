{% extends "base.html" %}

{% block content %}
<div class="hero-section" style="background-image: url('{{ url_for('static', filename='images/cooking1.png') }}')">
    <div class="container">
        <div class="hero-content">
            <h1>伝統の味 おでん屋</h1>
            <p>心温まる日本の味をお届けします</p>
        </div>
    </div>
</div>

<section class="gallery-preview py-5">
    <div class="container">
        <h2 class="section-title">ギャラリー</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <a href="{{ url_for('gallery') }}" class="gallery-thumbnail">
                    <img src="{{ url_for('static', filename='images/cooking1.png') }}" class="img-fluid rounded" alt="料理風景">
                    <div class="gallery-caption">
                        <p>料理風景</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="{{ url_for('gallery') }}" class="gallery-thumbnail">
                    <img src="{{ url_for('static', filename='images/cooking3.png') }}" class="img-fluid rounded" alt="店内写真">
                    <div class="gallery-caption">
                        <p>店内写真</p>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="{{ url_for('gallery') }}" class="gallery-thumbnail text-center">
                    <div class="more-photos">
                        <i class="fas fa-images fa-3x"></i>
                        <p>もっと見る</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
