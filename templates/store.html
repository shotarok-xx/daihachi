{% extends "base.html" %}

{% block content %}
<div class="store-header py-5 bg-light">
    <div class="container">
        <h1 class="text-center">店舗情報</h1>
    </div>
</div>

<section class="store-info py-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6 mb-4">
                <h2>営業時間</h2>
                <table class="table">
                    <tr>
                        <th>月-土</th>
                        <td>17:00 - 23:00</td>
                    </tr>
                    <tr>
                        <th>日曜・祝日</th>
                        <td>定休日</td>
                    </tr>
                </table>

                <h2 class="mt-4">アクセス</h2>
                <p>
                    〒XXX-XXXX<br>
                    東京都XX区XX町X-X-X<br>
                    XX駅から徒歩5分
                </p>

                <h2 class="mt-4">お問い合わせ</h2>
                <p>
                    電話: 03-XXXX-XXXX<br>
                    メール: info@oden-ya.jp
                </p>
            </div>
            <div class="col-md-6">
                <div id="map" style="height: 400px;">
                    <iframe 
                        width="100%" 
                        height="100%" 
                        frameborder="0" 
                        style="border:0" 
                        src="https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=Tokyo,Japan" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-12">
                <h2>店内の様子</h2>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <img src="https://images.unsplash.com/photo-1504416285472-eccf03dd31eb" class="img-fluid rounded" alt="Restaurant interior">
                    </div>
                    <div class="col-md-6 mb-4">
                        <img src="https://images.unsplash.com/photo-1534349762230-e0cadf78f5da" class="img-fluid rounded" alt="Traditional decoration">
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
